[package]
name = "arbolta"
version = "0.1.0"
authors = ["AMD Research & Advanced Development"]
edition = "2021"

[dependencies]
indexmap = "2.9.0"
tempfile = "3.19.1"
derive_more = { version = "2", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
bincode = {version = "2.0.1", features = ["serde"] }
