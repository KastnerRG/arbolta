ndarray = "0.16.1"
num-traits = "0.2"
rstest = "0.25.0"
flexbuffers = "25.2.10"
yosys-netlist-json = { git = "https://github.com/alexredd99/yosys-netlist-json.git" }
thiserror = "2.0.12"
